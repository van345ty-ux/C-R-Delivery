<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      (function() {
        // Versão de Emergência para forçar o navegador a recarregar o novo código
        var BOOTSTRAP_VERSION = '202604041311'; 
        var saved = localStorage.getItem('app_bootstrap_v');
        if (saved !== BOOTSTRAP_VERSION) {
          localStorage.setItem('app_bootstrap_v', BOOTSTRAP_VERSION);
          console.log('Bootstrap: Atualizando para ' + BOOTSTRAP_VERSION);
          window.location.reload(true);
        }
      })();
    </script>
    <title>C&amp;R Sushi - App de Delivery Completo</title>
    <meta name="google" content="notranslate" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Visual Version Badge for Diagnostics -->
    <div id="v-indicator" style="position:fixed;bottom:5px;right:5px;background:rgba(0,0,0,0.5);color:white;padding:2px 6px;border-radius:3px;font-size:9px;z-index:9999;pointer-events:none;font-family:monospace;">
      v2026.04.04-1322
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
