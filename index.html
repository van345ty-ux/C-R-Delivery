<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      (function() {
        // Versão de Controle - ATUALIZE ESTE NÚMERO EM CADA DEPLOY para forçar refresh
        var BOOTSTRAP_VERSION = '20260404_1332';
        var STORAGE_KEY = 'app_bootstrap_v';
        var saved = localStorage.getItem(STORAGE_KEY);
        
        if (saved !== BOOTSTRAP_VERSION) {
          // Nova versão detectada!
          localStorage.setItem(STORAGE_KEY, BOOTSTRAP_VERSION);
          console.log('Bootstrap: Nova versão detectada, forçando atualização...');
          
          // Verifica se ja estamos em um URL com cache-bust para evitar loop infinito
          var url = window.location.href;
          if (url.indexOf('?_cb=') === -1 && url.indexOf('&_cb=') === -1) {
            // Redireciona com parâmetro único - isso força o navegador a ignorar todo cache
            var sep = url.indexOf('?') !== -1 ? '&' : '?';
            window.location.replace(url + sep + '_cb=' + BOOTSTRAP_VERSION);
          }
        } else if (window.location.search.indexOf('_cb=') !== -1) {
          // Versão OK e temos parâmetro de cache-bust na URL - limpa a URL
          var cleanUrl = window.location.origin + window.location.pathname;
          window.history.replaceState({}, document.title, cleanUrl);
          console.log('Bootstrap: App atualizado com sucesso!');
        }
      })();
    </script>
    <title>C&amp;R Sushi - App de Delivery Completo</title>
    <meta name="google" content="notranslate" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Visual Version Badge for Diagnostics -->
    <div id="v-indicator" style="position:fixed;bottom:5px;right:5px;background:rgba(0,0,0,0.5);color:white;padding:2px 6px;border-radius:3px;font-size:9px;z-index:9999;pointer-events:none;font-family:monospace;">
      v2026.04.04-1322
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
